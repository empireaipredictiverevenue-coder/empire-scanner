<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMPIRE AI | PREDICTIVE INTEL</title>
    <style>
        :root { --blue: #00d2ff; --green: #39ff14; --orange: #ffaa00; --bg: #000; --card: #0c0c0c; }
        body { background: var(--bg); color: white; font-family: 'Helvetica Neue', sans-serif; margin: 0; padding: 15px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #111; padding-bottom: 10px; margin-bottom: 20px; }
        .glitch-text { font-weight: 900; letter-spacing: 2px; color: var(--blue); font-size: 1.2rem; }
        
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-box { background: var(--card); border: 1px solid #222; padding: 10px; border-radius: 8px; text-align: center; }
        .stat-label { font-size: 0.5rem; color: #666; text-transform: uppercase; margin-bottom: 5px; }
        .stat-value { font-size: 1rem; font-weight: bold; color: var(--green); }

        .lead-feed { width: 100%; max-width: 500px; margin: 0 auto; }
        .intel-card { background: var(--card); border-left: 4px solid var(--blue); margin-bottom: 15px; padding: 15px; border-radius: 0 10px 10px 0; position: relative; overflow: hidden; }
        .intel-card::after { content: ""; position: absolute; top: 0; right: 0; width: 30px; height: 100%; background: linear-gradient(to right, transparent, rgba(0, 210, 255, 0.05)); }
        
        .target-id { font-size: 0.6rem; color: var(--orange); margin-bottom: 5px; font-family: monospace; }
        .company-name { font-size: 1.3rem; font-weight: 800; margin-bottom: 10px; }
        
        .recovery-metrics { display: flex; gap: 10px; margin-top: 10px; }
        .metric { font-size: 0.7rem; background: #1a1a1a; padding: 5px 8px; border-radius: 4px; border: 1px solid #333; }
        .recovery-val { color: var(--green); font-weight: bold; }
    </style>
</head>
<body onload="initSystem()">

    <div class="header">
        <div class="glitch-text">EMPIRE // INTEL</div>
        <div id="clock" style="font-size: 0.8rem; font-family: monospace; color: #444;"></div>
    </div>

    <div class="grid-container">
        <div class="stat-box">
            <div class="stat-label">Network Load</div>
            <div class="stat-value" id="load">94.2%</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Waste Detected</div>
            <div class="stat-value" style="color:var(--orange)" id="waste">$184k</div>
        </div>
    </div>

    <div class="lead-feed" id="feed">
        <div style="text-align: center; color: #222;">SCANNING SATELLITE CHANNELS...</div>
    </div>

    <script>
        function updateStats() {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
            document.getElementById('load').innerText = (90 + Math.random() * 9).toFixed(1) + "%";
            // Randomly update waste to look alive
            if(Math.random() > 0.8) {
                let current = parseInt(document.getElementById('waste').innerText.replace('$', '').replace('k', ''));
                document.getElementById('waste').innerText = "$" + (current + 1) + "k";
            }
        }

        async function initSystem() {
            setInterval(updateStats, 1000);
            fetchData();
            setInterval(fetchData, 300000); // 5 min auto-refresh
        }

        async function fetchData() {
            const container = document.getElementById('feed');
            const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTrqH0eRL_PerKtkQ_TV42wtmeqrm_uBiSP7g9Zsrz43m4IfHwUJrJxka3Nhac2RP65vGCPO4GVR_4K/pub?gid=281204146&single=true&output=csv';

            try {
                const response = await fetch(url);
                const data = await response.text();
                const rows = data.split('\n').slice(1);
                container.innerHTML = '';

                rows.forEach((row, index) => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length >= 2) {
                        let lead = cols[0].replace(/"/g, "").trim();
                        let hook = cols[1].replace(/"/g, "").trim();
                        
                        // Split hook into metrics if you use a specific format, 
                        // or just show the text as "Operational Logic"
                        container.innerHTML += `
                            <div class="intel-card">
                                <div class="target-id">SATELLITE_FIX_0${index + 1}</div>
                                <div class="company-name">${lead}</div>
                                <div style="font-size: 0.75rem; color: #888; line-height: 1.4;">${hook}</div>
                                <div class="recovery-metrics">
                                    <div class="metric">REC_RATE: <span class="recovery-val">88%</span></div>
                                    <div class="metric">SETTLEMENT: <span class="recovery-val">ni57q</span></div>
                                </div>
                            </div>
                        `;
                    }
                });
            } catch (e) {
                container.innerHTML = "SYSTEM ERROR";
            }
        }
    </script>
</body>
</html>
