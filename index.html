<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMPIRE AI | HUD</title>
    <style>
        :root {
            --neon-blue: #0070f3;
            --neon-green: #00ff00;
            --bg-black: #050505;
            --card-gray: #111111;
        }

        body {
            background-color: var(--bg-black);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            width: 100%;
            max-width: 400px;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 1.5rem;
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .status-dot {
            height: 8px;
            width: 8px;
            background-color: var(--neon-green);
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            box-shadow: 0 0 10px var(--neon-green);
        }

        .btn-scan {
            width: 100%;
            max-width: 400px;
            background: var(--neon-blue);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .card {
            width: 100%;
            max-width: 400px;
            background: var(--card-gray);
            border: 1px solid #333;
            border-radius: 16px;
            padding: 20px;
            box-sizing: border-box;
        }

        .btn-sync {
            width: 100%;
            background: var(--neon-green);
            color: black;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .data-row {
            border-bottom: 1px solid #222;
            padding: 15px 0;
        }

        .lead-name {
            font-weight: bold;
            font-size: 1.1rem;
            color: white;
        }

        .status-text {
            color: var(--neon-blue);
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 4px;
        }

        .hook-box {
            margin-top: 12px;
            color: #ccc;
            line-height: 1.4;
            font-size: 0.9rem;
            background: #1a1a1a;
            padding: 10px;
            border-radius: 8px;
        }

        .wallet-tag {
            color: var(--neon-green);
            font-weight: bold;
            text-shadow: 0 0 5px var(--neon-green);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>EMPIRE AI</h1>
        <div><span class="status-dot"></span> SYSTEM ONLINE</div>
    </div>

    <button class="btn-scan" onclick="alert('Scanning Miami Logistics Hub...')">SCAN FOR WASTE</button>

    <div class="card">
        <button class="btn-sync" onclick="fetchData()">SYNC HUD DATA</button>
        <div id="lead-container">
            <div style="color: #444; text-align: center; padding: 20px;">READY FOR SYNC</div>
        </div>
    </div>

    <script>
        async function fetchData() {
            const container = document.getElementById('lead-container');
            container.innerHTML = '<div style="color: var(--neon-blue); text-align: center; padding: 20px;">UPLOADING SATELLITE DATA...</div>';
            
            try {
                // NEW VERIFIED API ENDPOINT
                const response = await fetch('https://api.steinhq.com/v1/storages/69de4ef33807a370b0495cbb/Leads');
                const data = await response.json();
                
                if (data.length > 0) {
                    container.innerHTML = '';
                    data.forEach(item => {
                        let displayHook = item.hook || "No hook found in sheet.";
                        // Format the ni57q tag to glow green
                        displayHook = displayHook.replace(/ni57q/g, '<span class="wallet-tag">ni57q</span>');

                        container.innerHTML += `
                            <div class="data-row">
                                <div style="display: flex; justify-content: space-between; align-items: start;">
                                    <div>
                                        <div class="lead-name">${item.lead || 'Target Unknown'}</div>
                                        <div class="status-text">TARGET ACQUIRED</div>
                                    </div>
                                </div>
                                <div class="hook-box">${displayHook}</div>
                            </div>
                        `;
                    });
                } else {
                    container.innerHTML = '<div style="color: #666; text-align: center; padding: 20px;">Sheet Data Not Found. Check Tab Name "Leads".</div>';
                }
            } catch (error) {
                container.innerHTML = '<div style="color: red; text-align: center; padding: 20px;">CONNECTION ERROR</div>';
            }
        }
    </script>
</body>
</html>
