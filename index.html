<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMPIRE AI | AUTOPILOT</title>
    <style>
        :root { --blue: #0070f3; --green: #00ff00; --red: #ff0055; --bg: #050505; --card: #111; }
        body { background: var(--bg); color: white; font-family: 'Courier New', monospace; margin: 0; padding: 15px; overflow-x: hidden; }
        
        /* SCANNED OVERLAY */
        .scan-line { position: fixed; top: 0; left: 0; width: 100%; height: 2px; background: rgba(0, 255, 0, 0.2); box-shadow: 0 0 10px var(--green); animation: scan 3s linear infinite; z-index: 999; pointer-events: none; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100vh; } }

        .header { border-left: 4px solid var(--red); padding-left: 15px; margin-bottom: 20px; }
        .alert-text { color: var(--red); font-size: 0.7rem; font-weight: bold; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .big-stat { background: var(--card); border: 1px solid #222; border-radius: 12px; padding: 20px; margin-bottom: 20px; text-align: center; }
        .timer { font-size: 2rem; color: var(--red); font-weight: bold; margin-bottom: 5px; }
        
        .lead-container { background: var(--card); border: 1px solid #333; border-radius: 12px; padding: 20px; }
        .data-row { border-bottom: 1px solid #222; padding: 15px 0; }
        .terminal-text { color: var(--green); font-size: 0.9rem; margin-top: 10px; min-height: 40px; }
        .wallet { color: var(--green); font-weight: bold; border: 1px solid var(--green); padding: 2px 5px; border-radius: 4px; }
    </style>
</head>
<body onload="startAutomation()">

    <div class="scan-line"></div>

    <div class="header">
        <h1 style="font-size: 1.2rem; letter-spacing: 2px; margin:0;">EMPIRE AI // AUTO-PITCH</h1>
        <div class="alert-text">ATTENTION: LIVE REVENUE LEAK DETECTED</div>
    </div>

    <div class="big-stat">
        <div style="font-size: 0.7rem; color: #888; text-transform: uppercase;">Recovery Window Closing:</div>
        <div class="timer" id="countdown">04:59</div>
        <div style="font-size: 0.6rem; color: var(--red);">SATELLITE RE-ENTRY IN PROGRESS</div>
    </div>

    <div class="lead-container" id="feed">
        <div style="text-align: center; color: #444;">INITIALIZING...</div>
    </div>

    <script>
        // 1. AUTO-TIMER
        function startTimer() {
            let time = 299;
            setInterval(() => {
                let mins = Math.floor(time / 60);
                let secs = time % 60;
                document.getElementById('countdown').innerText = `0${mins}:${secs < 10 ? '0' : ''}${secs}`;
                if (time > 0) time--;
            }, 1000);
        }

        // 2. AUTO-DATA FETCH
        async function startAutomation() {
            startTimer();
            const container = document.getElementById('feed');
            const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTrqH0eRL_PerKtkQ_TV42wtmeqrm_uBiSP7g9Zsrz43m4IfHwUJrJxka3Nhac2RP65vGCPO4GVR_4K/pub?gid=281204146&single=true&output=csv';

            try {
                const response = await fetch(url);
                const data = await response.text();
                const rows = data.split('\n');
                container.innerHTML = '';

                for (let i = 1; i < rows.length; i++) {
                    const columns = rows[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (columns.length >= 2) {
                        let lead = columns[0].replace(/"/g, "").trim();
                        let hook = columns[1].replace(/"/g, "").trim();
                        hook = hook.replace(/ni57q/g, '<span class="wallet">ni57q</span>');

                        container.innerHTML += `
                            <div class="data-row">
                                <div style="color:var(--blue); font-size:0.8rem;">TARGET: ${lead}</div>
                                <div class="terminal-text" id="typewriter-${i}"></div>
                            </div>
                        `;
                        
                        // Start the silent typing effect
                        typeEffect(`typewriter-${i}`, hook);
                    }
                }
            } catch (e) {
                container.innerHTML = "OFFLINE";
            }
        }

        function typeEffect(elementId, text) {
            let i = 0;
            const speed = 40; 
            function type() {
                if (i < text.length) {
                    document.getElementById(elementId).innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                }
            }
            type();
        }
    </script>
</body>
</html>
