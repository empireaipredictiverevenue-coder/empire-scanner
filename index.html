<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMPIRE AI // MULTI-STACK</title>
    <style>
        :root { --blue: #00d2ff; --green: #39ff14; --bg: #000; --panel: #0d0d0d; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 15px; }
        
        /* NAV TABS */
        .nav-container { display: flex; gap: 5px; margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 10px; overflow-x: auto; }
        .tab { padding: 8px 15px; border-radius: 6px; font-size: 0.65rem; font-weight: 900; text-transform: uppercase; cursor: pointer; border: 1px solid #333; color: #555; white-space: nowrap; }
        .tab.active { border-color: var(--blue); color: var(--blue); background: rgba(0, 210, 255, 0.05); }

        /* HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo { font-weight: 900; letter-spacing: 3px; font-size: 1rem; }
        .status { color: var(--green); font-size: 0.6rem; font-weight: bold; display: flex; align-items: center; }
        .dot { height: 6px; width: 6px; background: var(--green); border-radius: 50%; margin-right: 6px; box-shadow: 0 0 8px var(--green); }

        /* DATA CARDS */
        .card { background: var(--panel); border: 1px solid #222; border-radius: 12px; margin-bottom: 15px; overflow: hidden; }
        .card-meta { background: #1a1a1a; padding: 8px 15px; display: flex; justify-content: space-between; font-size: 0.65rem; color: var(--blue); font-family: monospace; font-weight: bold; }
        .card-body { padding: 15px; }
        .card-title { font-size: 1.2rem; font-weight: 800; margin-bottom: 8px; }
        .card-data { font-size: 0.9rem; color: #b0b0b0; line-height: 1.4; }
        .leak-tag { color: #ff4444; font-weight: bold; }

        .ops-log { background: #050505; border: 1px solid var(--blue); padding: 10px; font-family: monospace; font-size: 0.7rem; color: var(--blue); height: 60px; overflow: hidden; border-radius: 8px; margin-top: 20px; }
    </style>
</head>
<body onload="init()">

    <div class="header">
        <div class="logo">EMPIRE<span style="color:var(--blue)">AI</span></div>
        <div class="status"><div class="dot"></div> MULTI-STACK LIVE</div>
    </div>

    <div class="nav-container">
        <div class="tab active" onclick="switchStack('logistics', this)">Logistics</div>
        <div class="tab" onclick="switchStack('orlando', this)">Orlando HVAC</div>
        <div class="tab" onclick="switchStack('roofing', this)">Roofing Leads</div>
    </div>

    <div id="stack-feed">
        <div style="text-align: center; color: #444; padding: 40px;">LOADING CORE STACK...</div>
    </div>

    <div class="ops-log" id="ops-log">
        <div>> SYNCING ORLANDO DATA...</div>
    </div>

    <script>
        const SHEETS = {
            logistics: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTrqH0eRL_PerKtkQ_TV42wtmeqrm_uBiSP7g9Zsrz43m4IfHwUJrJxka3Nhac2RP65vGCPO4GVR_4K/pub?gid=281204146&single=true&output=csv',
            orlando: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTrqH0eRL_PerKtkQ_TV42wtmeqrm_uBiSP7g9Zsrz43m4IfHwUJrJxka3Nhac2RP65vGCPO4GVR_4K/pub?gid=0&single=true&output=csv', // Update GID
            roofing: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTrqH0eRL_PerKtkQ_TV42wtmeqrm_uBiSP7g9Zsrz43m4IfHwUJrJxka3Nhac2RP65vGCPO4GVR_4K/pub?gid=123456&single=true&output=csv' // Replace with your Roofing Sheet GID
        };

        let currentStack = 'logistics';

        function switchStack(stack, el) {
            currentStack = stack;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            fetchData();
        }

        async function init() {
            fetchData();
            setInterval(() => {
                const logs = ["[ SATELLITE_FIX_STABLE ]", "[ SYNCING_ORLANDO_REVENUE ]", "[ ROOF_SCAN_COMPLETE ]"];
                const logBox = document.getElementById('ops-log');
                const entry = document.createElement('div');
                entry.innerText = "> " + logs[Math.floor(Math.random() * logs.length)];
                logBox.prepend(entry);
                if (logBox.children.length > 3) logBox.lastChild.remove();
            }, 4000);
        }

        async function fetchData() {
            const container = document.getElementById('stack-feed');
            try {
                const response = await fetch(SHEETS[currentStack]);
                const csv = await response.text();
                const rows = csv.split('\n').slice(1);
                container.innerHTML = '';

                rows.forEach((row, i) => {
                    const data = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (data.length >= 2) {
                        let title = data[0].replace(/"/g, "").trim();
                        let body = data[1].replace(/"/g, "").trim();
                        
                        // Highlight Settlement Code
                        body = body.replace(/ni57q/g, '<span style="color:var(--green)">ni57q</span>');
                        
                        // Fake visual logic for Orlando Leak detection
                        if(currentStack === 'orlando') {
                            body += ' <br><span class="leak-tag">ESTIMATED REVENUE LEAK: $1.2M+</span>';
                        }

                        container.innerHTML += `
                            <div class="card">
                                <div class="card-meta">
                                    <span>ID: ${currentStack.toUpperCase()}_0${i+1}</span>
                                    <span>ANALYSIS: ACTIVE</span>
                                </div>
                                <div class="card-body">
                                    <div class="card-title">${title}</div>
                                    <div class="card-data">${body}</div>
                                </div>
                            </div>
                        `;
                    }
                });
            } catch (e) {
                container.innerHTML = "CONNECTION ERROR: CHECK SHEET GID";
            }
        }
    </script>
</body>
</html>
