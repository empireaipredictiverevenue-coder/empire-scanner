<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMPIRE AI | HUD</title>
    <style>
        :root {
            --neon-blue: #0070f3;
            --neon-green: #00ff00;
            --bg-black: #050505;
            --card-gray: #111111;
        }

        body {
            background-color: var(--bg-black);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            width: 100%;
            max-width: 400px;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 1.5rem;
            letter-spacing: 2px;
            margin: 0;
            text-transform: uppercase;
        }

        .status-bar {
            display: flex;
            align-items: center;
            font-size: 0.8rem;
            color: var(--neon-green);
            margin-top: 5px;
        }

        .status-dot {
            height: 8px;
            width: 8px;
            background-color: var(--neon-green);
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 10px var(--neon-green);
        }

        .btn-sync {
            width: 100%;
            max-width: 400px;
            background: var(--neon-green);
            color: black;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .card {
            width: 100%;
            max-width: 400px;
            background: var(--card-gray);
            border: 1px solid #333;
            border-radius: 16px;
            padding: 20px;
            box-sizing: border-box;
        }

        .data-row {
            border-bottom: 1px solid #222;
            padding: 15px 0;
        }

        .data-row:last-child { border-bottom: none; }

        .lead-name {
            font-weight: bold;
            font-size: 1.1rem;
            color: white;
        }

        .status-text {
            color: var(--neon-blue);
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 4px;
        }

        .hook-box {
            margin-top: 12px;
            color: #ccc;
            line-height: 1.4;
            font-size: 0.9rem;
            background: #1a1a1a;
            padding: 10px;
            border-radius: 8px;
            border-left: 3px solid var(--neon-blue);
        }

        .wallet-tag {
            color: var(--neon-green);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>EMPIRE AI</h1>
        <div class="status-bar"><span class="status-dot"></span> DIRECT SATELLITE FEED</div>
    </div>

    <button class="btn-sync" onclick="fetchData()">SYNC HUD DATA</button>

    <div class="card" id="lead-container">
        <div style="color: #444; text-align: center; padding: 20px;">READY FOR SYNC</div>
    </div>

    <script>
        async function fetchData() {
            const container = document.getElementById('lead-container');
            container.innerHTML = '<div style="color: var(--neon-blue); text-align: center; padding: 20px;">STREAMING DATA...</div>';
            
            // Your direct CSV export link
            const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTrqH0eRL_PerKtkQ_TV42wtmeqrm_uBiSP7g9Zsrz43m4IfHwUJrJxka3Nhac2RP65vGCPO4GVR_4K/pub?gid=281204146&single=true&output=csv';

            try {
                const response = await fetch(url);
                const data = await response.text();
                const rows = data.split('\n');
                
                // Clear container
                container.innerHTML = '';

                // Loop through rows (skipping header row 0)
                for (let i = 1; i < rows.length; i++) {
                    const columns = rows[i].split(',');
                    if (columns.length >= 2) {
                        let lead = columns[0].trim();
                        let hook = columns[1].trim();

                        // Glow ni57q tag
                        hook = hook.replace(/ni57q/g, '<span class="wallet-tag">ni57q</span>');

                        container.innerHTML += `
                            <div class="data-row">
                                <div class="lead-name">${lead}</div>
                                <div class="status-text">TARGET ACQUIRED</div>
                                <div class="hook-box">${hook}</div>
                            </div>
                        `;
                    }
                }
            } catch (error) {
                container.innerHTML = '<div style="color: red; text-align: center; padding: 20px;">CONNECTION FAILED</div>';
            }
        }
    </script>
</body>
</html>
